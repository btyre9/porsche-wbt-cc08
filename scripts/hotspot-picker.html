<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotspot Position Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0F;
      color: #f0f0f0;
      font-family: 'Porsche Next', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex: 0 0 auto;
      padding: 14px 24px;
      background: #16161a;
      border-bottom: 1px solid #2a2a2e;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #f0f0f0;
    }
    .accent-bar {
      width: 32px; height: 4px;
      background: #D5001C;
      border-radius: 2px;
    }
    header .hint {
      font-size: 13px;
      color: #888;
      margin-left: auto;
    }

    /* ── Main layout ── */
    .layout {
      flex: 1 1 auto;
      display: flex;
      overflow: hidden;
    }

    /* ── Image panel ── */
    .image-panel {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111114;
      position: relative;
      overflow: hidden;
    }

    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 60px 80px;
      color: #555;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #D5001C;
      color: #aaa;
    }
    .drop-zone svg { opacity: 0.4; }
    .drop-zone p { font-size: 14px; }
    .drop-zone label {
      display: inline-block;
      padding: 8px 20px;
      background: #D5001C;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #file-input { display: none; }

    /* ── Image wrapper (shown after load) ── */
    #img-wrap {
      position: relative;
      display: none;
      cursor: crosshair;
      line-height: 0;
    }
    #img-wrap img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 56px);
      width: auto;
      height: auto;
      user-select: none;
      pointer-events: none;
    }

    /* ── Hotspot markers (match actual template style) ── */
    .hs-marker {
      position: absolute;
      width: 36px;
      height: 36px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hs-marker .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(213,0,28,0.55);
      animation: picker-pulse 2s ease-out infinite;
    }
    .hs-marker .dot {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #D5001C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    @keyframes picker-pulse {
      0%   { transform: scale(1);   opacity: 0.9; }
      60%  { transform: scale(1.7); opacity: 0; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    /* ── Sidebar ── */
    .sidebar {
      flex: 0 0 340px;
      background: #16161a;
      border-left: 1px solid #2a2a2e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #2a2a2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h2 { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
    .btn-group { display: flex; gap: 8px; }
    button {
      padding: 6px 12px;
      border: 1px solid #333;
      background: transparent;
      color: #ccc;
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #222; border-color: #555; }
    button.danger:hover { border-color: #D5001C; color: #D5001C; }
    button.primary {
      background: #D5001C;
      border-color: #D5001C;
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: #b80018; }

    /* ── Output area ── */
    .output-wrap {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 20px;
    }
    #output {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: #b8f7c0;
      white-space: pre;
      min-height: 60px;
    }
    #output .key   { color: #87ceeb; }
    #output .val   { color: #f0e68c; }
    #output .sep   { color: #666; }
    #output .empty { color: #444; font-style: italic; }

    /* ── Coordinates list ── */
    .coords-list {
      flex: 0 0 auto;
      border-top: 1px solid #2a2a2e;
      padding: 12px 20px;
      max-height: 160px;
      overflow-y: auto;
    }
    .coords-list h3 { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #666; margin-bottom: 8px; }
    .coord-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e22;
      font-size: 12px;
    }
    .coord-row:last-child { border-bottom: none; }
    .coord-num {
      width: 22px; height: 22px;
      background: #D5001C;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .coord-xy { color: #f0f0f0; flex: 1; }
    .coord-del {
      color: #555;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.15s;
    }
    .coord-del:hover { color: #D5001C; }

    /* ── Copy feedback ── */
    .copy-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #09D087;
      color: #000;
      padding: 10px 18px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .copy-toast.show { opacity: 1; transform: translateY(0); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="accent-bar"></div>
  <h1>Hotspot Position Picker</h1>
  <span class="hint">Click image to place markers &nbsp;·&nbsp; Drag to reposition &nbsp;·&nbsp; Copy storyboard output</span>
</header>

<div class="layout">

  <!-- Image panel -->
  <div class="image-panel" id="image-panel">
    <div class="drop-zone" id="drop-zone">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <p>Drop an image here</p>
      <label>Browse…<input type="file" id="file-input" accept="image/*"></label>
    </div>
    <div id="img-wrap">
      <img id="preview-img" src="" alt="">
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Storyboard Output</h2>
      <div class="btn-group">
        <button class="danger" id="btn-clear">Clear all</button>
        <button class="primary" id="btn-copy">Copy</button>
      </div>
    </div>

    <div class="output-wrap">
      <div id="output"><span class="empty">Place markers on the image to see storyboard fields here.</span></div>
    </div>

    <div class="coords-list" id="coords-list">
      <h3>Placed markers</h3>
      <div id="coords-rows"><span style="color:#444;font-size:12px;">None yet</span></div>
    </div>
  </div>

</div>

<div class="copy-toast" id="copy-toast">Copied to clipboard</div>

<script>
(function () {
  var markers = [];  // [{x, y}] — percentages

  var dropZone  = document.getElementById('drop-zone');
  var fileInput = document.getElementById('file-input');
  var imgWrap   = document.getElementById('img-wrap');
  var img       = document.getElementById('preview-img');
  var output    = document.getElementById('output');
  var coordRows = document.getElementById('coords-rows');
  var btnClear  = document.getElementById('btn-clear');
  var btnCopy   = document.getElementById('btn-copy');
  var toast     = document.getElementById('copy-toast');

  // ── Image loading ──────────────────────────────────────────────────────────

  function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      img.src = e.target.result;
      dropZone.style.display = 'none';
      imgWrap.style.display = 'block';
      markers = [];
      renderMarkers();
      updateOutput();
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', function () { loadImage(fileInput.files[0]); });

  dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadImage(e.dataTransfer.files[0]);
  });

  // ── Click to place ─────────────────────────────────────────────────────────

  var dragging = null;
  var dragOffsetX = 0, dragOffsetY = 0;

  imgWrap.addEventListener('mousedown', function (e) {
    var rect = img.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;

    // Check if clicking on an existing marker
    var hit = null;
    imgWrap.querySelectorAll('.hs-marker').forEach(function (el, i) {
      var mx = markers[i].x / 100 * rect.width;
      var my = markers[i].y / 100 * rect.height;
      var dist = Math.sqrt((cx - mx) * (cx - mx) + (cy - my) * (cy - my));
      if (dist <= 18) hit = i;
    });

    if (hit !== null) {
      dragging = hit;
      imgWrap.style.cursor = 'grabbing';
      e.preventDefault();
      return;
    }

    // New marker
    if (markers.length >= 10) return;
    var x = parseFloat(((cx / rect.width)  * 100).toFixed(1));
    var y = parseFloat(((cy / rect.height) * 100).toFixed(1));
    x = Math.max(0, Math.min(100, x));
    y = Math.max(0, Math.min(100, y));
    markers.push({ x: x, y: y });
    renderMarkers();
    updateOutput();
  });

  window.addEventListener('mousemove', function (e) {
    if (dragging === null) return;
    var rect = img.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    var x = parseFloat(((cx / rect.width)  * 100).toFixed(1));
    var y = parseFloat(((cy / rect.height) * 100).toFixed(1));
    x = Math.max(0, Math.min(100, x));
    y = Math.max(0, Math.min(100, y));
    markers[dragging].x = x;
    markers[dragging].y = y;
    renderMarkers();
    updateOutput();
  });

  window.addEventListener('mouseup', function () {
    if (dragging !== null) {
      dragging = null;
      imgWrap.style.cursor = 'crosshair';
    }
  });

  // ── Render markers ─────────────────────────────────────────────────────────

  function renderMarkers() {
    imgWrap.querySelectorAll('.hs-marker').forEach(function (el) { el.remove(); });

    markers.forEach(function (m, i) {
      var el = document.createElement('div');
      el.className = 'hs-marker';
      el.innerHTML = '<div class="ring"></div><div class="dot">' + (i + 1) + '</div>';
      el.style.left = m.x + '%';
      el.style.top  = m.y + '%';
      imgWrap.appendChild(el);
    });

    updateCoordRows();
  }

  // ── Coordinate rows ────────────────────────────────────────────────────────

  function updateCoordRows() {
    if (!markers.length) {
      coordRows.innerHTML = '<span style="color:#444;font-size:12px;">None yet</span>';
      return;
    }
    coordRows.innerHTML = markers.map(function (m, i) {
      return '<div class="coord-row">' +
        '<div class="coord-num">' + (i + 1) + '</div>' +
        '<div class="coord-xy">x: <b>' + m.x + '</b>&nbsp;&nbsp;y: <b>' + m.y + '</b></div>' +
        '<span class="coord-del" data-idx="' + i + '" title="Remove">×</span>' +
      '</div>';
    }).join('');

    coordRows.querySelectorAll('.coord-del').forEach(function (el) {
      el.addEventListener('click', function () {
        var idx = parseInt(el.getAttribute('data-idx'));
        markers.splice(idx, 1);
        renderMarkers();
        updateOutput();
      });
    });
  }

  // ── Storyboard output ──────────────────────────────────────────────────────

  function updateOutput() {
    if (!markers.length) {
      output.innerHTML = '<span class="empty">Place markers on the image to see storyboard fields here.</span>';
      return;
    }

    var lines = markers.map(function (m, i) {
      var n = i + 1;
      return [
        fmt('Hotspot-' + n + '-X',     m.x),
        fmt('Hotspot-' + n + '-Y',     m.y),
        fmt('Hotspot-' + n + '-Title', '[Title for hotspot ' + n + ']'),
        fmt('Hotspot-' + n + '-Body',  '[1–3 sentence summary visible in the modal]'),
        fmt('Voiceover-CLICK-Hotspot' + n, '[2–4 sentence coached explanation — expands on body, uses concrete examples]'),
      ].join('\n');
    });

    output.innerHTML = lines.join('\n\n');
  }

  function fmt(key, val) {
    return '<span class="key">' + esc(key) + '</span><span class="sep">: </span><span class="val">' + esc(String(val)) + '</span>';
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Controls ───────────────────────────────────────────────────────────────

  btnClear.addEventListener('click', function () {
    markers = [];
    renderMarkers();
    updateOutput();
  });

  btnCopy.addEventListener('click', function () {
    if (!markers.length) return;
    var plain = markers.map(function (m, i) {
      var n = i + 1;
      return [
        'Hotspot-' + n + '-X: '     + m.x,
        'Hotspot-' + n + '-Y: '     + m.y,
        'Hotspot-' + n + '-Title: [Title for hotspot ' + n + ']',
        'Hotspot-' + n + '-Body: [1–3 sentence summary visible in the modal]',
        'Voiceover-CLICK-Hotspot' + n + ': [2–4 sentence coached explanation — expands on body, uses concrete examples]',
      ].join('\n');
    }).join('\n\n');

    navigator.clipboard.writeText(plain).then(function () {
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 2000);
    }).catch(function () {
      /* clipboard blocked (file:// in some browsers) — show text in a prompt */
      window.prompt('Copy this:', plain);
    });
  });

  // ── Keyboard ── undo last with Ctrl+Z ─────────────────────────────────────

  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      if (markers.length) {
        markers.pop();
        renderMarkers();
        updateOutput();
        e.preventDefault();
      }
    }
  });

}());
</script>
</body>
</html>
