<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Slide shell ─────────────────────────────────────────────────────── */
    .slide {
      background: #0D0D0F;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 72px 80px 72px 80px;
      gap: 40px;
    }

    /* ── Header — title at top-left ─────────────────────────────────────── */
    .slide-header {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
      max-width: 1100px;
    }
    .red-accent {
      width: 120px;
      height: 6px;
      background: var(--pds-accent);
    }
    .slide-title {
      font-size: 72px;
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.08;
      color: var(--pds-text-primary);
      margin: 0;
    }
    .slide-subtitle {
      font-size: var(--pds-font-size-md);
      color: var(--pds-contrast-medium);
      margin: 0;
      max-width: 820px;
      line-height: 1.45;
    }

    /* ── Tile row ────────────────────────────────────────────────────────── */
    .tile-row {
      display: flex;
      flex-direction: row;
      gap: 16px;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    .tile {
      position: relative;
      flex: 1 1 0;
      min-width: 0;
      background: #111114;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: flex-grow 0.6s cubic-bezier(0, 0, 0.2, 1);
    }

    /* Hover expansion — echoing porsche.com DesktopCarRangeTile behavior */
    .tile-row:hover .tile               { flex-grow: 0.85; }
    .tile-row:hover .tile:hover         { flex-grow: 1.3;  }
    .tile.is-active                     { flex-grow: 1.3;  }

    /* Locked during INTRO VO */
    .tile-row.intro-locked              { pointer-events: none; }
    .tile-row.intro-locked .tile        { opacity: 0.45; filter: brightness(0.55); transition: opacity 0.4s ease, filter 0.4s ease; }
    .tile-row:not(.intro-locked) .tile  { transition: flex-grow 0.6s cubic-bezier(0,0,0.2,1), opacity 0.4s ease, filter 0.4s ease; }

    /* ── Tile placeholder (shown when image missing) ─────────────────────── */
    .tile-placeholder {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: repeating-linear-gradient(
        -45deg,
        #0E0E12 0px, #0E0E12 24px,
        #141418 24px, #141418 48px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.03em;
      padding: 12px;
      text-align: center;
    }

    /* ── Poster image ────────────────────────────────────────────────────── */
    .tile-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 1;
      transition: transform 1.2s cubic-bezier(0, 0, 0.2, 1);
    }
    .tile:hover .tile-poster,
    .tile.is-active .tile-poster { transform: scale(1.05); }

    /* ── Dim overlay ─────────────────────────────────────────────────────── */
    .tile-dim {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .tile.is-active .tile-dim { opacity: 1; }

    /* ── Top + bottom gradient overlays for text legibility ─────────────── */
    .tile::before,
    .tile::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      pointer-events: none;
      z-index: 3;
    }
    .tile::before {
      top: 0; height: 38%;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.80) 0%,
        rgba(0,0,0,0.60) 30%,
        rgba(0,0,0,0.28) 65%,
        rgba(0,0,0,0) 100%);
    }
    .tile::after {
      bottom: 0; height: 62%;
      background: linear-gradient(0deg,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.78) 22%,
        rgba(0,0,0,0.52) 48%,
        rgba(0,0,0,0.20) 78%,
        rgba(0,0,0,0) 100%);
    }

    /* ── Signature badge — number · keyword at top center ───────────────── */
    .tile-signature {
      position: absolute;
      top: 40px; left: 0; right: 0;
      z-index: 6;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .tile-signature__mark {
      font-size: 14px;
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #FFFFFF;
      opacity: 0.80;
    }
    .tile-signature__divider {
      width: 28px;
      height: 2px;
      background: var(--pds-accent);
      margin-left: 14px;
      align-self: center;
    }

    /* ── Bottom content area: title + bullets ────────────────────────────── */
    .tile-content {
      position: absolute;
      left: 40px; right: 40px;
      bottom: 36px;
      z-index: 13;
      display: flex;
      flex-direction: column;
      gap: 18px;
      color: #FFFFFF;
      pointer-events: none;
    }
    .tile-title {
      font-size: 38px;
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.08;
      margin: 0;
      color: #FFFFFF;
      letter-spacing: -0.01em;
    }

    /* Bullets — hidden until tile is active (max-height transition) */
    .tile-bullets {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.55s cubic-bezier(0, 0, 0.2, 1), opacity 0.35s ease;
    }
    .tile.is-active .tile-bullets {
      max-height: 420px;
      opacity: 1;
    }
    .tile-bullets li {
      display: flex;
      gap: 10px;
      font-size: var(--pds-font-size-md);
      line-height: 1.45;
      color: rgba(255,255,255,0.88);
    }
    .tile-bullets li::before {
      content: '';
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pds-accent);
      margin-top: 9px;
    }

    /* ── "Explore →" CTA — visible on hover, hidden when active ─────────── */
    .tile-cta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .tile:hover:not(.is-active) .tile-cta-row {
      opacity: 1;
      transform: none;
    }
    .tile.is-active .tile-cta-row {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }
    .tile-cta {
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #FFFFFF;
    }
    .tile-cta__arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      font-size: 14px;
      color: #FFFFFF;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.3s ease;
    }
    .tile:hover .tile-cta__arrow,
    .tile.is-active .tile-cta__arrow {
      background: var(--pds-accent);
      border-color: var(--pds-accent);
      transform: translateX(3px);
    }

    /* ── Visited state — green checkmark on signature badge ─────────────── */
    .tile.visited .tile-signature__mark::after {
      content: ' ✓';
      color: var(--pds-success, #09D087);
      margin-left: 6px;
    }
    .tile.visited {
      box-shadow: inset 0 0 0 1.5px rgba(9, 208, 135, 0.55);
    }

    /* ── Entrance animations ─────────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-block.is-visible { opacity: 1; transform: none; }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Header — title anchors to top-left per layout rule -->
  <header class="slide-header">
    <div class="red-accent anim-block" id="el-accent"></div>
    <h1 class="slide-title anim-block" id="el-title">{{SLIDE_TITLE}}</h1>
    <p class="slide-subtitle anim-block" id="el-subtitle">{{SLIDE_SUBTITLE}}</p>
  </header>

  <!-- Tile row — populated by generator from Tile-* and Image-* storyboard fields -->
  <div class="tile-row" id="tile-row">
{{TILES_HTML}}
  </div>

</div>

<!-- Player interaction wiring: locks Next until all tiles are visited -->
{{TILE_INIT_SCRIPT}}

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* Header entrance — stagger accent bar, title, subtitle */
  ['el-accent', 'el-title', 'el-subtitle'].forEach(function (id, i) {
    var el = document.getElementById(id);
    if (!el) return;
    setTimeout(function () { el.classList.add('is-visible'); }, 80 + i * 100);
  });

  /* Tiles stagger in from below on load */
  var tiles = document.querySelectorAll('.tile');
  tiles.forEach(function (el, i) {
    el.style.opacity   = '0';
    el.style.transform = 'translateY(24px)';
    el.style.transition =
      'opacity 0.6s ease, transform 0.6s cubic-bezier(0, 0, 0.2, 1), ' +
      'flex-grow 0.6s cubic-bezier(0, 0, 0.2, 1), box-shadow 0.3s ease';
    setTimeout(function () {
      el.style.opacity   = '';
      el.style.transform = '';
    }, 320 + i * 140);
  });

}());
</script>

</body>
</html>
