<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Left dark panel ──────────────────────────────────────────────────── */
    .split-left {
      position: absolute;
      left: 0; top: 0;
      width: 1040px;
      height: 920px;
      background: #0D0D0F;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Right photo panel ────────────────────────────────────────────────── */
    .split-right {
      position: absolute;
      right: 0; top: 0;
      width: 880px;
      height: 920px;
      z-index: 1;
      overflow: hidden;
    }
    .img-placeholder {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: repeating-linear-gradient(
        -45deg,
        #0E0E12 0px, #0E0E12 24px,
        #141418 24px, #141418 48px
      );
    }
    .split-right img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 65%;
      display: block;
      z-index: 1;
    }
    .split-right::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        to right,
        #0D0D0F 0%,
        rgba(13, 13, 15, 0.50) 12%,
        rgba(13, 13, 15, 0.00) 30%
      );
    }

    /* ── Decorative skewed bars ───────────────────────────────────────────── */
    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px;
      height: 920px;
      z-index: 1;
      pointer-events: none;
    }
    .deco-bar {
      position: absolute;
      left: 0;
      width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg);
      transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    /* ── Content area — title near top ───────────────────────────────────── */
    .content-area {
      position: absolute;
      left: 100px; top: 0;
      width: 900px;
      height: 920px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 88px;
    }

    /* ── Red accent bar ───────────────────────────────────────────────────── */
    .red-accent {
      width: 120px;
      height: 8px;
      background: var(--pds-accent);
      margin-bottom: 20px;
    }

    /* ── Headline ─────────────────────────────────────────────────────────── */
    .headline {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.05;
      color: var(--pds-text-primary);
      margin: 0 0 28px 0;
      max-width: 820px;
    }

    /* ── Intro text (optional, above columns) ─────────────────────────────── */
    .intro-text {
      font-size: var(--pds-font-size-md);
      color: var(--pds-contrast-high);
      line-height: 1.55;
      margin: 0 0 28px 0;
      max-width: 820px;
    }

    /* ── Single bullet list (used when Bullet-1..N present) ──────────────── */
    .bullets-single {
      display: flex;
      flex-direction: column;
      gap: 16px;
      list-style: none;
      margin: 0 0 28px 0;
      padding: 0;
    }
    .bullets-single li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.45;
      color: var(--pds-contrast-high);
    }
    .bullet-dot {
      flex-shrink: 0;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--pds-accent);
      margin-top: 8px;
    }

    /* ── Two-column bullet grid (used when Col-Left-Body / Col-Right-Body set) */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 32px;
      margin-bottom: 28px;
    }
    .col-header {
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--pds-text-primary);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--pds-border);
    }
    .bullet-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .bullet-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.45;
      color: var(--pds-contrast-high);
    }

    /* ── Entrance animation ───────────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-block.is-visible {
      opacity: 1;
      transform: none;
    }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Left dark panel -->
  <div class="split-left">
    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>

    <div class="content-area">

      <div class="red-accent anim-block" id="el-eyebrow" aria-hidden="true"></div>

      <h2 class="headline anim-block" id="el-headline">{{SLIDE_TITLE}}</h2>

      <!-- Intro text (from On-Screen-Text) -->
      <p class="intro-text anim-block" id="el-intro">{{ON_SCREEN_TEXT}}</p>

      <!-- Single bullet list (from Bullet-1..N fields) -->
      <ul class="bullets-single anim-block" id="el-bullets">
{{BULLETS_HTML}}
      </ul>

      <!-- Two-column layout (from Col-Left-Body / Col-Right-Body fields) -->
      <div class="columns anim-block" id="el-columns">
        <div id="el-col-left">
          <div class="col-header">{{COL_LEFT_HEADER}}</div>
          <ul class="bullet-list">
{{COL_LEFT_BULLETS}}
          </ul>
        </div>
        <div id="el-col-right">
          <div class="col-header">{{COL_RIGHT_HEADER}}</div>
          <ul class="bullet-list">
{{COL_RIGHT_BULLETS}}
          </ul>
        </div>
      </div>

    </div>
  </div>

  <!-- Right photo -->
  <div class="split-right">
    <div class="img-placeholder" aria-hidden="true"></div>
    {{IMAGE_HTML}}
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* Hide empty sections */
  var intro   = document.getElementById('el-intro');
  var bullets = document.getElementById('el-bullets');
  var columns = document.getElementById('el-columns');

  if (intro   && !intro.textContent.trim())   intro.style.display   = 'none';
  if (bullets && !bullets.querySelector('li')) bullets.style.display = 'none';

  /* Hide columns section if both headers and bullets are empty */
  var colHeaders = columns ? columns.querySelectorAll('.col-header') : [];
  var colBullets = columns ? columns.querySelectorAll('.bullet-list li') : [];
  if (columns && colHeaders.length === 0 && colBullets.length === 0) columns.style.display = 'none';

  /* Stagger entrance */
  var loadEls    = ['el-eyebrow', 'el-headline', 'el-intro', 'el-bullets', 'el-columns']
                     .map(function (id) { return document.getElementById(id); })
                     .filter(function (el) { return el && el.style.display !== 'none'; });
  var loadDelays = [0, 100, 240, 380, 380];

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      loadEls.forEach(function (el, i) {
        setTimeout(function () { el.classList.add('is-visible'); }, loadDelays[i] || 0);
      });
    });
  });

  /* Dim all bullets on load, brighten sequentially via VO audio time */
  var allBullets = Array.prototype.slice.call(document.querySelectorAll('.bullet-list li, .bullets-single li'));
  gsap.set(allBullets, { filter: 'brightness(0.4)' });

  function getAudioTime() {
    try {
      if (window.parent && window.parent.CourseRuntime) {
        var t = window.parent.CourseRuntime.getAudioCurrentTime();
        if (Number.isFinite(t) && t > 0) return t;
      }
    } catch (_) {}
    return 0;
  }

  /* VO cue times (seconds) — fill in after recording. One null per bullet. */
  var bulletTimes = {{BULLET_TIMES_ARRAY}};
  var bulletFired = bulletTimes.map(function () { return false; });
  var activeIdx   = -1;

  function activateBullet(idx) {
    if (activeIdx >= 0 && allBullets[activeIdx]) {
      gsap.to(allBullets[activeIdx], { scale: 1, duration: 0.45, ease: 'power2.out', overwrite: true });
    }
    allBullets.forEach(function (el, i) {
      if (i > idx) gsap.to(el, { filter: 'brightness(0.4)', duration: 0.4, ease: 'power2.out', overwrite: true });
    });
    if (allBullets[idx]) {
      gsap.to(allBullets[idx], {
        scale: 1.06, filter: 'brightness(1.35)', duration: 0.4,
        ease: 'power2.out', transformOrigin: 'left center', overwrite: true
      });
    }
    activeIdx = idx;
  }

  var virtualTime = 0;
  var lastTick    = Date.now();

  function tick() {
    var now = Date.now();
    var delta = now - lastTick;
    lastTick = now;
    if (!document.documentElement.classList.contains('slide-paused')) {
      var audioTime = getAudioTime();
      virtualTime = audioTime > 0 ? audioTime : virtualTime + delta / 1000;
      bulletTimes.forEach(function (t, i) {
        if (t !== null && !bulletFired[i] && virtualTime >= t) {
          bulletFired[i] = true;
          activateBullet(i);
        }
      });
    }
    requestAnimationFrame(tick);
  }
  tick();

  /* Restore all bullets when VO ends */
  var hadAudio = false;
  function checkEnd() {
    var t = getAudioTime();
    if (t > 0)         { hadAudio = true; }
    else if (hadAudio) { hadAudio = false; gsap.to(allBullets, { scale: 1, filter: 'brightness(1)', duration: 0.5, ease: 'power2.out', stagger: 0.04 }); }
    requestAnimationFrame(checkEnd);
  }
  requestAnimationFrame(checkEnd);

}());
</script>

</body>
</html>
