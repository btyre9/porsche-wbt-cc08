<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Left dark panel ──────────────────────────────────────────────────── */
    .split-left {
      position: absolute;
      left: 0; top: 0;
      width: 1040px;
      height: 920px;
      background: #0D0D0F;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Right photo panel ────────────────────────────────────────────────── */
    .split-right {
      position: absolute;
      right: 0; top: 0;
      width: 880px;
      height: 920px;
      z-index: 1;
      overflow: hidden;
    }
    .img-placeholder {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: repeating-linear-gradient(
        -45deg,
        #0E0E12 0px, #0E0E12 24px,
        #141418 24px, #141418 48px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.03em;
      padding: 16px;
      text-align: center;
    }
    .split-right img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 1;
    }
    .split-right::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        to right,
        #0D0D0F 0%,
        rgba(13, 13, 15, 0.50) 12%,
        rgba(13, 13, 15, 0.00) 30%
      );
    }

    /* ── Decorative skewed bars ───────────────────────────────────────────── */
    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px;
      height: 920px;
      z-index: 1;
      pointer-events: none;
    }
    .deco-bar {
      position: absolute;
      left: 0;
      width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg);
      transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    /* ── Content area — title at top-left, stat number below ─────────────── */
    .content-area {
      position: absolute;
      left: 100px; top: 0;
      width: 900px;
      height: 920px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 80px;
    }

    /* ── Red accent bar ───────────────────────────────────────────────────── */
    .red-accent {
      width: 120px;
      height: 8px;
      background: var(--pds-accent);
      margin-bottom: 24px;
    }

    /* ── Slide title (above the stat) ─────────────────────────────────────── */
    .slide-title {
      font-size: var(--pds-font-size-xl);
      font-weight: var(--pds-font-weight-regular);
      color: var(--pds-contrast-medium);
      line-height: 1.2;
      margin: 0 0 32px 0;
      max-width: 800px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Stat value — the hero number ─────────────────────────────────────── */
    .stat-value {
      font-size: 200px;
      font-weight: var(--pds-font-weight-bold);
      color: var(--pds-text-primary);
      line-height: 0.9;
      margin: 0 0 20px 0;
      letter-spacing: -0.02em;
    }

    /* ── Red divider under the number ─────────────────────────────────────── */
    .stat-divider {
      width: 80px;
      height: 4px;
      background: var(--pds-accent);
      margin-bottom: 24px;
    }

    /* ── Stat label ───────────────────────────────────────────────────────── */
    .stat-label {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-regular);
      color: var(--pds-contrast-high);
      line-height: 1.25;
      max-width: 700px;
    }

    /* ── Entrance animation state ─────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-block.is-visible {
      opacity: 1;
      transform: none;
    }
    .anim-count {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .anim-count.is-visible {
      opacity: 1;
      transform: none;
    }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Left dark panel -->
  <div class="split-left">
    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>

    <div class="content-area">

      <div class="red-accent anim-block" id="el-accent" aria-hidden="true"></div>

      <p class="slide-title anim-block" id="el-title">{{SLIDE_TITLE}}</p>

      <div class="stat-value anim-count" id="el-stat-value" aria-label="{{STAT_VALUE}} {{STAT_LABEL}}">
        {{STAT_VALUE}}
      </div>

      <div class="stat-divider anim-block" id="el-divider" aria-hidden="true"></div>

      <p class="stat-label anim-block" id="el-stat-label" aria-hidden="true">
        {{STAT_LABEL}}
      </p>

    </div>
  </div>

  <!-- Right photo -->
  <div class="split-right">
    <div class="img-placeholder" aria-hidden="true">{{IMAGE_PLACEHOLDER_LABEL}}</div>
    {{IMAGE_HTML}}
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  var delays = [0, 120, 260, 400, 500];
  var ids    = ['el-accent', 'el-title', 'el-stat-value', 'el-divider', 'el-stat-label'];

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      ids.forEach(function (id, i) {
        var el = document.getElementById(id);
        if (!el) return;
        setTimeout(function () { el.classList.add('is-visible'); }, delays[i]);
      });
    });
  });

}());
</script>

</body>
</html>
