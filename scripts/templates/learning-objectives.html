<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Objectives</title>

  <style>
    @font-face {
      font-family: 'Porsche Next TT';
      src: url('../assets/fonts/porsche-next-tt.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Porsche Next TT';
      src: url('../assets/fonts/porsche-next-tt-bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --pds-font-size-display: 56px;
      --pds-font-size-lg:      22px;
      --pds-font-size-md:      18px;
      --pds-font-size-sm:      16px;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Porsche Next TT', Arial, Helvetica, sans-serif;
    }

    .anim-fade {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .anim-fade.is-visible { opacity: 1; }

    .anim-slide-up {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .anim-slide-up.is-visible { opacity: 1; transform: translateY(0); }

    .anim-scale-up { opacity: 0; transform: scale(0.88); }

    .slide-root::before {
      content: "";
      position: absolute;
      inset: -100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      transform: rotate(45deg);
      pointer-events: none;
      z-index: 0;
    }
    .slide-image {
      height: 800px;
      width: 550px;
      right: 50px;
      top: 80px;
      position: absolute;
      overflow: hidden;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
    }

    /* ── Objective list ───────────────────────────────────────────────────── */
    .obj-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .obj-item {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .obj-number {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #D5001C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    .obj-text {
      font-size: 20px;
      font-weight: 400;
      line-height: 1.45;
      color: rgba(251, 252, 255, 0.88);
    }
  </style>
</head>

<body>
  <div class="slide-root" data-slide-id="{{SLIDE_ID}}"
    style="width: 1920px; height: 920px; position: relative; background: radial-gradient(1400px 700px at 10% -10%, #343a48 0%, transparent 60%), linear-gradient(140deg, #111317 0%, #1e2128 48%, #2a2f39 100%); overflow: hidden">

    <div class="anim-fade slide-image" id="slide-image" style="background-image: url('../assets/images/{{IMAGE_FILE}}');"></div>

    <div style="width: 1320px; height: 920px; left: 0; top: 0; position: absolute">

      <div class="anim-fade" id="red-accent"
        style="width: 120px; height: 8px; left: 120px; top: 62px; position: absolute; background: #D5001C"></div>

      <div class="anim-slide-up" id="slide-title"
        style="width: 1140px; left: 120px; top: 84px; position: absolute; color: white; font-size: var(--pds-font-size-display); font-weight: 700; line-height: 66px;">
        {{SLIDE_TITLE}}</div>

      <div class="anim-fade" id="intro-text"
        style="width: 1100px; left: 120px; top: 184px; position: absolute; color: white; font-size: var(--pds-font-size-md); font-weight: 400; line-height: 28px;">
        {{INTRO_TEXT}}</div>

      <ul class="obj-list" style="width: 1100px; left: 120px; top: 242px; position: absolute;">
        {{OBJECTIVES_HTML}}
      </ul>

    </div>
  </div>

  <script>
    (function () {
      var slide = document.querySelector('[data-slide-id]');
      function scaleSlide() {
        var s = Math.min(window.innerWidth / 1920, window.innerHeight / 920);
        slide.style.transform       = 'scale(' + s + ')';
        slide.style.transformOrigin = 'top left';
        slide.style.marginLeft      = ((window.innerWidth  - 1920 * s) / 2) + 'px';
        slide.style.marginTop       = ((window.innerHeight -  920 * s) / 2) + 'px';
      }
      window.addEventListener('resize', scaleSlide);
      scaleSlide();
    })();
  </script>

  <script src="../assets/vendor/gsap/gsap.min.js"></script>
  <script src="../assets/vendor/slide-pause.js"></script>

  <script>
(function () {
  var _tHandlers = [];
  var _eHandlers = [];
  var _lastTime = -1;
  var _wasPlaying = false;
  var _endedFired = false;

  function getCR() {
    try { return window.parent && window.parent.CourseRuntime; } catch (_) { return null; }
  }

  var fakeInteractionAudio = {
    src: '',
    play: function () {
      var cr = getCR();
      if (cr && this.src) cr.playInteractionAudio({ src: this.src });
      return Promise.resolve();
    },
    pause: function () {}
  };

  var fakeAudio = {
    get currentTime() { var cr = getCR(); return cr ? (cr.getAudioCurrentTime() || 0) : 0; },
    get duration()    { var cr = getCR(); return cr && cr.getAudioDuration ? (cr.getAudioDuration() || 0) : 0; },
    addEventListener: function (type, fn) {
      if (type === 'timeupdate') _tHandlers.push(fn);
      else if (type === 'ended') _eHandlers.push(fn);
    },
    removeEventListener: function () {}
  };

  window.SandboxRuntime = {
    voAudio: fakeAudio,
    interactionAudio: fakeInteractionAudio,
    init: function () {},
    playInteractionClip: function (id) { var cr = getCR(); if (cr) cr.playInteractionClip(id); }
  };

  function poll() {
    var cr = getCR();
    if (cr) {
      var t = cr.getAudioCurrentTime ? cr.getAudioCurrentTime() : 0;
      var playing = cr.isAudioPlaying ? cr.isAudioPlaying() : false;
      if (t !== _lastTime) {
        _lastTime = t;
        var e = { target: fakeAudio, type: 'timeupdate' };
        for (var i = 0; i < _tHandlers.length; i++) { try { _tHandlers[i](e); } catch (_e) {} }
      }
      if (_wasPlaying && !playing && !_endedFired && _eHandlers.length) {
        var dur = cr.getAudioDuration ? cr.getAudioDuration() : 0;
        if (dur > 0 && t >= dur - 0.5) {
          _endedFired = true;
          var ee = { target: fakeAudio, type: 'ended' };
          for (var j = 0; j < _eHandlers.length; j++) { try { _eHandlers[j](ee); } catch (_e) {} }
        }
      }
      _wasPlaying = playing;
      if (!playing && t === 0) _endedFired = false;
    }
    requestAnimationFrame(poll);
  }
  requestAnimationFrame(poll);
})();
  </script>

  <script>
    (function () {
      var headerAccent = document.getElementById('red-accent');
      var headerTitle  = document.getElementById('slide-title');
      var introText    = document.getElementById('intro-text');
      var slideImage   = document.getElementById('slide-image');
      var objectives   = {{OBJECTIVES_IDS_JS}}
                           .map(function (id) { return document.getElementById(id); });

      if (headerAccent) setTimeout(function () { headerAccent.classList.add('is-visible'); }, 0);
      if (headerTitle)  setTimeout(function () { headerTitle.classList.add('is-visible'); }, 180);
      if (introText)    setTimeout(function () { introText.classList.add('is-visible'); }, 350);
      if (slideImage)   setTimeout(function () { slideImage.classList.add('is-visible'); }, 600);

      gsap.set(objectives, { opacity: 0, scale: 0.88, transformOrigin: 'left center' });
      gsap.to(objectives, {
        opacity: 1,
        scale: 1,
        duration: 0.55,
        ease: 'back.out(1.4)',
        stagger: 0.28,
        delay: 0.65
      });

      // TODO: set cue times (seconds) after VO is recorded
      var voTimes = {{VO_CUE_TIMES_JS}};
      var voFired = voTimes.map(function () { return false; });
      var activeIdx = -1;

      function activateObjective(idx) {
        if (activeIdx >= 0 && objectives[activeIdx]) {
          gsap.to(objectives[activeIdx], { scale: 1, duration: 0.5, ease: 'power2.out', overwrite: true });
        }
        objectives.forEach(function (el, i) {
          if (i > idx && el) {
            gsap.to(el, { filter: 'brightness(0.5)', duration: 0.5, ease: 'power2.out', overwrite: true });
          }
        });
        if (objectives[idx]) {
          gsap.to(objectives[idx], { scale: 1.06, filter: 'brightness(1.35)', duration: 0.45, ease: 'power2.out', overwrite: true });
        }
        activeIdx = idx;
      }

      function getAudioTime() {
        try {
          if (window.parent && window.parent.CourseRuntime) {
            var ct = window.parent.CourseRuntime.getAudioCurrentTime();
            if (Number.isFinite(ct) && ct > 0) return ct;
          }
        } catch (_) {}
        if (window.SandboxRuntime && window.SandboxRuntime.voAudio) {
          var sat = window.SandboxRuntime.voAudio.currentTime;
          if (Number.isFinite(sat) && sat > 0) return sat;
        }
        return 0;
      }

      var virtualTime = 0;
      var lastTick = Date.now();

      function tick() {
        var now   = Date.now();
        var delta = now - lastTick;
        lastTick  = now;
        if (!document.documentElement.classList.contains('slide-paused')) {
          var audioTime = getAudioTime();
          virtualTime = audioTime > 0 ? audioTime : virtualTime + delta / 1000;
          objectives.forEach(function (el, i) {
            if (!voFired[i] && virtualTime >= voTimes[i]) {
              voFired[i] = true;
              activateObjective(i);
            }
          });
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>

</html>
