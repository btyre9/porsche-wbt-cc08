<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    .score-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);
      gap: var(--pds-space-xl);
      text-align: center;
    }
    .score-card {
      width: 640px;
      padding: var(--pds-space-2xl);
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border);
      border-radius: var(--pds-radius-xl);
      box-shadow: var(--pds-shadow-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--pds-space-lg);
    }
    .score-eyebrow {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--pds-text-muted);
    }
    .score-accent-bar {
      width: 80px;
      height: 4px;
      background: var(--pds-accent);
    }
    .score-pct {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-stat);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1;
    }
    .score-pct--pass { color: var(--pds-success); }
    .score-pct--fail { color: var(--pds-error); }
    .score-detail {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-md);
      color: var(--pds-text-secondary);
    }
    .score-message {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-lg);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-primary);
      line-height: var(--pds-line-height);
      max-width: 480px;
    }
    .score-actions {
      display: flex;
      gap: var(--pds-space-md);
      flex-wrap: wrap;
      justify-content: center;
      margin-top: var(--pds-space-sm);
    }
    .score-btn {
      padding: 12px 28px;
      border-radius: var(--pds-radius-pill);
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-sm);
      font-weight: var(--pds-font-weight-semibold);
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .score-btn--primary {
      background: var(--pds-accent);
      color: var(--pds-brand-white);
      border: 2px solid var(--pds-accent);
    }
    .score-btn--primary:hover { background: var(--pds-accent-hover); border-color: var(--pds-accent-hover); }
    .score-btn--outline {
      background: transparent;
      color: var(--pds-accent);
      border: 2px solid var(--pds-accent);
    }
    .score-btn--outline:hover { background: var(--pds-accent); color: var(--pds-brand-white); }

    /* Show correct panel via class on .score-layout */
    .score-panel { display: none; }
    .score-layout.is-pass .score-panel--pass { display: contents; }
    .score-layout.is-fail .score-panel--fail { display: contents; }

    /* ── Print certificate ─────────────────────────────────────────────── */
    .certificate { display: none; }
    @media print {
      .slide, script { display: none !important; }
      .certificate { display: block !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      @page { size: 8.5in 11in portrait; margin: 0; }
      html, body { width: 8.5in; height: 11in; overflow: visible; transform: none !important; margin: 0 !important; }
    }
    .certificate {
      position: relative;
      width: 8.5in; height: 11in;
      overflow: hidden;
      font-family: "Porsche Next TT", "Arial Narrow", Arial, sans-serif;
    }
    .cert-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: block; }
    .cert-overlay-name {
      position: absolute; top: 36%; left: 50%; transform: translate(-50%, -100%);
      margin: 0; font-size: 22pt; font-weight: 400; color: #1a1a1a;
      text-align: center; white-space: nowrap; letter-spacing: 0.02em;
    }
    .cert-overlay-course {
      position: absolute; top: 46%; left: 50%; transform: translateX(-50%);
      margin: 0; font-size: 22pt; font-weight: 700; font-style: italic;
      color: #1a1a1a; text-align: center; white-space: nowrap;
    }
    .cert-overlay-date {
      position: absolute; top: 74%; left: 76.1%; transform: translate(-19%, -50%);
      margin: 0; font-size: 13pt; font-weight: 700; color: #3d2000;
      text-align: center; letter-spacing: 0.02em; padding: 5px 14px;
      border-radius: 3px; white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">
  <div class="score-layout" id="score-layout">
    <div class="score-card anim-scale-in">

      <span class="score-eyebrow">{{SLIDE_TITLE}}</span>
      <div class="score-accent-bar"></div>

      <div class="score-pct" id="score-pct">—%</div>
      <div class="score-detail" id="score-detail">Loading results…</div>

      <!-- PASS panel -->
      <div class="score-panel score-panel--pass" style="display:contents;">
        <p class="score-message" id="pass-message">
          Congratulations! You've passed the Module 8 assessment.
        </p>
        <div class="score-actions">
          <button class="score-btn score-btn--primary" id="print-cert-btn" type="button">
            Print / Save Certificate
          </button>
        </div>
      </div>

      <!-- FAIL panel -->
      <div class="score-panel score-panel--fail" style="display:contents;">
        <p class="score-message" id="fail-message">
          Keep practicing! You'll need to revisit this module before moving forward.
        </p>
        <div class="score-actions">
          <button class="score-btn score-btn--outline" id="retake-btn" type="button">
            Retake Module
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Print-only certificate -->
<div class="certificate" id="certificate" aria-hidden="true">
  <img class="cert-bg" src="../assets/images/certificate-template.jpg" alt="">
  <p class="cert-overlay-name" id="cert-name">Porsche Technician</p>
  <p class="cert-overlay-course" id="cert-course">{{MODULE_LABEL}}</p>
  <p class="cert-overlay-date" id="cert-date">01/01/2026</p>
</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {
  var PASS_THRESHOLD  = 80;
  var RESULTS_KEY     = '{{QUIZ_RESULTS_KEY}}';
  var latestResult    = { correct: 0, total: 0, pct: 0, passed: false };

  document.querySelectorAll('.anim-scale-in').forEach(function (el) {
    el.classList.add('is-visible');
  });

  function getCR() {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; } catch (_) { return null; }
  }

  function showResults(results) {
    var pct    = results.total > 0 ? Math.round((results.correct / results.total) * 100) : 0;
    var passed = pct >= PASS_THRESHOLD;
    latestResult = { correct: results.correct || 0, total: results.total || 0, pct: pct, passed: passed };

    var layout   = document.getElementById('score-layout');
    var pctEl    = document.getElementById('score-pct');
    var detailEl = document.getElementById('score-detail');

    pctEl.textContent = pct + '%';
    pctEl.classList.add(passed ? 'score-pct--pass' : 'score-pct--fail');
    detailEl.textContent = results.correct + ' of ' + results.total + ' correct';
    layout.classList.add(passed ? 'is-pass' : 'is-fail');

    /* Play congratulations / encouragement audio */
    try {
      var CR = getCR();
      if (CR && CR.playInteractionAudio) {
        CR.playInteractionAudio({ src: passed
          ? '../assets/audio/vo/Congratulations.mp3'
          : '../assets/audio/vo/FailResponse.mp3' });
      }
    } catch (_) {}

    /* Report to SCORM */
    try {
      var CR2 = getCR();
      if (CR2 && CR2.submitFinalQuiz) CR2.submitFinalQuiz(pct);
    } catch (_) {}
  }

  function getLearnerName() {
    try {
      if (window.API) {
        var n = window.API.LMSGetValue('cmi.core.student_name');
        if (n && n !== '') return formatName(n);
      }
    } catch (_) {}
    try {
      if (window.API_1484_11) {
        var n2 = window.API_1484_11.GetValue('cmi.learner_name');
        if (n2 && n2 !== '') return formatName(n2);
      }
    } catch (_) {}
    return 'Porsche Technician';
  }

  function formatName(raw) {
    var s = String(raw || '');
    if (s.indexOf(',') === -1) return s;
    var p = s.split(',').map(function (x) { return x.trim(); });
    return (p[1] ? p[1] + ' ' : '') + (p[0] || '');
  }

  function populateCertificate() {
    var now = new Date();
    var mm  = String(now.getMonth() + 1).padStart(2, '0');
    var dd  = String(now.getDate()).padStart(2, '0');
    var yyyy = now.getFullYear();

    var nameEl   = document.getElementById('cert-name');
    var dateEl   = document.getElementById('cert-date');
    if (nameEl) nameEl.textContent = getLearnerName();
    if (dateEl) dateEl.textContent = mm + '/' + dd + '/' + yyyy;
  }

  function printCertificate() {
    if (!latestResult.passed) return;
    populateCertificate();
    window.print();
  }

  /* Load results: prefer session storage, then fall back to player aggregate */
  try {
    var stored = null;
    try { stored = JSON.parse(sessionStorage.getItem(RESULTS_KEY) || 'null'); } catch (_) {}
    if (stored && typeof stored.correct === 'number' && stored.total > 0) {
      showResults(stored);
    } else {
      var CR = getCR();
      if (CR && CR.getFinalResults) showResults(CR.getFinalResults());
      else showResults({ correct: 0, total: 10 });
    }
  } catch (_) {
    showResults({ correct: 0, total: 10 });
  }

  /* Retake */
  var retakeBtn = document.getElementById('retake-btn');
  if (retakeBtn) {
    retakeBtn.addEventListener('click', function () {
      window.parent.postMessage({ type: 'sandbox-goto', target: 'start' }, '*');
    });
  }

  /* Print certificate */
  var printBtn = document.getElementById('print-cert-btn');
  if (printBtn) printBtn.addEventListener('click', printCertificate);
}());
</script>

</body>
</html>
