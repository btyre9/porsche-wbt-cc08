<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Full-bleed placeholder (shown when image missing) ───────────────── */
    .img-placeholder {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: repeating-linear-gradient(
        -45deg,
        #0E0E12 0px, #0E0E12 24px,
        #141418 24px, #141418 48px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.03em;
      padding: 16px;
      text-align: center;
    }

    /* ── Full-bleed background image ─────────────────────────────────────── */
    .bg-image {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .bg-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── Dark gradient scrim — heavier on left for text legibility ───────── */
    .scrim {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        to right,
        rgba(13, 13, 15, 0.94) 0%,
        rgba(13, 13, 15, 0.82) 30%,
        rgba(13, 13, 15, 0.42) 58%,
        rgba(13, 13, 15, 0.10) 100%
      );
    }

    /* ── Quote content area ───────────────────────────────────────────────── */
    .content-area {
      position: absolute;
      left: 120px; top: 0;
      width: 820px;
      height: 920px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Red accent bar ───────────────────────────────────────────────────── */
    .red-accent {
      width: 120px;
      height: 8px;
      background: var(--pds-accent);
      margin-bottom: 36px;
    }

    /* ── Decorative open-quote mark ──────────────────────────────────────── */
    .quote-mark {
      font-size: 108px;
      line-height: 0.65;
      color: var(--pds-accent);
      font-weight: var(--pds-font-weight-bold);
      margin-bottom: 20px;
      user-select: none;
    }

    /* ── Quote text ───────────────────────────────────────────────────────── */
    .quote-text {
      font-size: 50px;
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.22;
      color: var(--pds-text-primary);
      max-width: 780px;
      margin: 0 0 44px 0;
      letter-spacing: -0.01em;
    }

    /* ── Red divider between quote and attribution ───────────────────────── */
    .attribution-divider {
      width: 80px;
      height: 4px;
      background: var(--pds-accent);
      margin-bottom: 24px;
    }

    /* ── Attribution name ────────────────────────────────────────────────── */
    .attribution-name {
      font-size: var(--pds-font-size-lg);
      font-weight: var(--pds-font-weight-bold);
      color: var(--pds-text-primary);
      margin: 0 0 6px 0;
    }

    /* ── Attribution title/role ──────────────────────────────────────────── */
    .attribution-role {
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      color: var(--pds-contrast-medium);
      margin: 0;
    }

    /* ── Entrance animation state ─────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-block.is-visible {
      opacity: 1;
      transform: none;
    }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- L0: Striped placeholder — visible when image is absent -->
  <div class="img-placeholder" aria-hidden="true">{{IMAGE_PLACEHOLDER_LABEL}}</div>

  <!-- L1: Full-bleed atmospheric image -->
  <div class="bg-image" aria-hidden="true">{{IMAGE_HTML}}</div>

  <!-- L2: Dark gradient scrim for text legibility -->
  <div class="scrim" aria-hidden="true"></div>

  <!-- L3: Quote content -->
  <section class="content-area" aria-label="{{SLIDE_TITLE}}">

    <div class="red-accent anim-block" id="el-accent" aria-hidden="true"></div>

    <div class="quote-mark anim-block" id="el-qmark" aria-hidden="true">&ldquo;</div>

    <blockquote class="quote-text anim-block" id="el-quote">
      {{QUOTE_TEXT}}
    </blockquote>

    <div class="attribution-divider anim-block" id="el-divider" aria-hidden="true"></div>

    <p class="attribution-name anim-block" id="el-name">{{QUOTE_ATTRIBUTION_NAME}}</p>

    <p class="attribution-role anim-block" id="el-role">{{QUOTE_ATTRIBUTION_TITLE}}</p>

  </section>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  var delays = [0, 80, 200, 380, 480, 560];
  var ids    = ['el-accent', 'el-qmark', 'el-quote', 'el-divider', 'el-name', 'el-role'];

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      ids.forEach(function (id, i) {
        var el = document.getElementById(id);
        if (!el) return;
        setTimeout(function () { el.classList.add('is-visible'); }, delays[i]);
      });
    });
  });

}());
</script>

</body>
</html>
