<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    .slide {
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Left panel — title ───────────────────────────────────────────────── */
    .left-panel {
      flex-shrink: 0;
      width: 560px;
      height: 920px;
      background: #0D0D0F;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 100px 56px 80px 100px;
      position: relative;
      z-index: 2;
    }

    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px; height: 920px;
      z-index: 1; pointer-events: none;
    }
    .deco-bar {
      position: absolute; left: 0; width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg); transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    .red-accent {
      width: 120px; height: 8px;
      background: var(--pds-accent);
      margin-bottom: 20px;
    }

    .headline {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.08;
      color: var(--pds-text-primary);
      margin: 0 0 20px 0;
    }

    .intro-text {
      font-size: var(--pds-font-size-sm);
      color: var(--pds-contrast-high);
      line-height: 1.55;
      margin: 0;
    }

    /* ── Right panel — tab interface + image ────────────────────────────── */
    .right-panel {
      flex: 1;
      height: 920px;
      background: #111116;
      display: flex;
      flex-direction: row;
      position: relative;
      overflow: hidden;
    }

    /* Tab nav + content column */
    .tab-content-col {
      width: 740px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 72px 60px 72px 80px;
      position: relative;
      z-index: 2;
    }

    /* Image column */
    .tab-image-col {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .tab-image-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease;
    }

    /* Left-edge scrim so text column blends into the image */
    .tab-image-col::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        #111116 0%,
        rgba(17,17,22,0.55) 18%,
        rgba(17,17,22,0.10) 45%,
        transparent 70%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── Tab navigation ──────────────────────────────────────────────────── */
    .tabs-nav {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid rgba(255,255,255,0.10);
      margin-bottom: 36px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 14px 24px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-sm);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-muted);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .tab-btn:hover { color: var(--pds-text-secondary); }
    .tab-btn.is-active {
      color: var(--pds-text-primary);
      border-bottom-color: var(--pds-accent);
    }
    .tab-btn:disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    /* ── Tab panels ──────────────────────────────────────────────────────── */
    .tabs-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      justify-content: flex-start;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .tab-panel.is-active {
      display: flex;
      opacity: 1;
      transform: none;
    }

    .tab-panel__body {
      font-size: var(--pds-font-size-md);
      line-height: 1.65;
      color: var(--pds-contrast-high);
      margin: 0;
      max-width: 900px;
    }

    /* ── Entrance animations ─────────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .anim-block.is-visible { opacity: 1; transform: none; }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Left: title panel -->
  <div class="left-panel">
    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>
    <div class="red-accent anim-block" id="el-accent"></div>
    <h2 class="headline anim-block" id="el-headline">{{SLIDE_TITLE}}</h2>
    <p class="intro-text anim-block" id="el-intro">{{ON_SCREEN_TEXT}}</p>
  </div>

  <!-- Right: tab interface + image -->
  <div class="right-panel">
    <div class="tab-content-col">
      <div class="tabs-nav" id="tabs-nav" role="tablist">
{{TABS_HTML}}
      </div>
      <div class="tabs-content">
{{TAB_PANELS_HTML}}
      </div>
    </div>
    <div class="tab-image-col" id="tab-image-col">
      <img id="tab-image" src="{{TAB_FIRST_IMAGE}}" alt="" draggable="false">
    </div>
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* ── Entrance animations ───────────────────────────────────────────────── */
  ['el-accent', 'el-headline', 'el-intro'].forEach(function (id, i) {
    var el = document.getElementById(id);
    if (!el) return;
    setTimeout(function () { el.classList.add('is-visible'); }, 80 + i * 120);
  });

  var tabsNav = document.getElementById('tabs-nav');
  if (tabsNav) {
    tabsNav.style.opacity = '0';
    tabsNav.style.transform = 'translateY(14px)';
    tabsNav.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    setTimeout(function () {
      tabsNav.style.opacity = '';
      tabsNav.style.transform = '';
    }, 320);
  }

  /* ── Tab image map ─────────────────────────────────────────────────────── */
  var TAB_IMAGE_MAP = {{TAB_IMAGE_MAP}};
  var tabImg = document.getElementById('tab-image');

  /* ── Tab switching ─────────────────────────────────────────────────────── */
  var buttons = Array.from(document.querySelectorAll('.tab-btn'));
  var panels  = Array.from(document.querySelectorAll('.tab-panel'));

  function activateTab(btn) {
    var label = btn.getAttribute('data-tab');
    var audio = btn.getAttribute('data-audio');

    buttons.forEach(function (b) {
      b.classList.remove('is-active');
      b.setAttribute('aria-selected', 'false');
      b.setAttribute('tabindex', '-1');
    });
    panels.forEach(function (p) { p.classList.remove('is-active'); });

    btn.classList.add('is-active');
    btn.setAttribute('aria-selected', 'true');
    btn.setAttribute('tabindex', '0');

    var panel = document.getElementById('panel-' + label);
    if (panel) {
      panel.style.opacity = '0';
      panel.style.transform = 'translateY(10px)';
      panel.classList.add('is-active');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          panel.style.opacity = '';
          panel.style.transform = '';
        });
      });
    }

    /* Swap tab image with a brief fade */
    if (tabImg && TAB_IMAGE_MAP[label]) {
      tabImg.style.opacity = '0';
      setTimeout(function () {
        tabImg.src = TAB_IMAGE_MAP[label];
        tabImg.style.opacity = '';
      }, 180);
    }

    if (audio) {
      window.parent.postMessage({
        type: 'sandbox-play-interaction',
        src: audio,
        id: label,
        pauseNarration: true,
        resumeNarration: false
      }, '*');
    }
  }

  /* ── Declare required interactions so Next locks until all tabs visited ─── */
  var allTabIds = buttons.map(function (b) { return b.getAttribute('data-tab'); });
  window.parent.postMessage({
    type: 'sandbox-configure-interactions',
    requiredIds: allTabIds,
    finalCueSrc: 'assets/audio/vo/Click_Next.mp3',
    lockNextUntilComplete: true
  }, '*');

  /* ── INTRO lock: tabs disabled until player signals VO complete ─────────── */
  var tabsLocked = true;
  if (tabsNav) tabsNav.style.pointerEvents = 'none';

  function unlockTabs() {
    if (!tabsLocked) return;
    tabsLocked = false;
    if (tabsNav) tabsNav.style.pointerEvents = '';
    /* Show first tab content visually — audio plays only on explicit user click */
    if (buttons.length > 0) {
      var first = buttons[0];
      buttons.forEach(function (b) { b.classList.remove('is-active'); b.setAttribute('aria-selected', 'false'); b.setAttribute('tabindex', '-1'); });
      panels.forEach(function (p) { p.classList.remove('is-active'); });
      first.classList.add('is-active');
      first.setAttribute('aria-selected', 'true');
      first.setAttribute('tabindex', '0');
      var firstPanel = document.getElementById('panel-' + first.getAttribute('data-tab'));
      if (firstPanel) firstPanel.classList.add('is-active');
    }
  }

  /* Robust fallback: wait for player-intro-state; if none arrives, assume standalone */
  var _introMsgReceived = false;
  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-intro-state') return;
    _introMsgReceived = true;
    if (!e.data.locked) unlockTabs();
  });
  setTimeout(function () { if (!_introMsgReceived) unlockTabs(); }, 300);

  /* ── Tab click/keyboard handlers ──────────────────────────────────────── */
  buttons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (!tabsLocked) activateTab(btn);
    });
    btn.addEventListener('keydown', function (e) {
      if (tabsLocked) return;
      var idx = buttons.indexOf(btn);
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        var next = buttons[(idx + 1) % buttons.length];
        activateTab(next);
        next.focus();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        var prev = buttons[(idx - 1 + buttons.length) % buttons.length];
        activateTab(prev);
        prev.focus();
      }
    });
  });

  /* Mark tabs visited from player progress messages */
  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-interaction-progress') return;
    var btn = buttons.find(function (b) { return b.getAttribute('data-tab') === e.data.id; });
    if (btn) btn.classList.add('visited');
  });

}());
</script>

</body>
</html>
