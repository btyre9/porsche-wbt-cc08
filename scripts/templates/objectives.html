<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Slide background ─────────────────────────────────────────────────── */
    .slide {
      background:
        radial-gradient(1400px 700px at 10% -10%, #343a48 0%, transparent 60%),
        linear-gradient(140deg, #111317 0%, #1e2128 48%, #2a2f39 100%);
      overflow: hidden;
    }

    /* ── Subtle grid pattern ──────────────────────────────────────────────── */
    .slide::before {
      content: '';
      position: absolute;
      inset: -100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      transform: rotate(45deg);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Right image panel ────────────────────────────────────────────────── */
    .slide-image {
      position: absolute;
      height: 800px;
      width: 550px;
      right: 50px;
      top: 60px;
      overflow: hidden;
      border-radius: 12px;
      z-index: 1;
    }
    .img-placeholder {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(14,14,18,0.7) 0px, rgba(14,14,18,0.7) 24px,
        rgba(20,20,24,0.7) 24px, rgba(20,20,24,0.7) 48px
      );
      border-radius: 12px;
    }
    .slide-image img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 1;
      border-radius: 12px;
    }

    /* ── Content area ─────────────────────────────────────────────────────── */
    .content-area {
      position: absolute;
      left: 0; top: 0;
      width: 1280px;
      height: 920px;
      z-index: 2;
      padding: 68px 0 68px 120px;
      display: flex;
      flex-direction: column;
    }

    /* ── Red accent bar ───────────────────────────────────────────────────── */
    .red-accent {
      width: 120px;
      height: 8px;
      background: #D5001C;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    /* ── Slide title ──────────────────────────────────────────────────────── */
    .slide-title {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.05;
      color: #FBFCFF;
      margin: 0 0 20px 0;
      max-width: 1060px;
      flex-shrink: 0;
    }

    /* ── Intro text ───────────────────────────────────────────────────────── */
    .intro-text {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.55;
      color: rgba(251,252,255,0.74);
      margin: 0 0 28px 0;
      max-width: 880px;
      flex-shrink: 0;
    }

    /* ── Objectives list ──────────────────────────────────────────────────── */
    .obj-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .obj-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      max-width: 940px;
    }

    .obj-number {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: rgba(213,0,28,0.15);
      border: 1px solid rgba(213,0,28,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #D5001C;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }

    .obj-text {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(251,252,255,0.88);
      padding-top: 12px;
    }

    /* ── Entrance animations ─────────────────────────────────────────────── */
    .anim-fade {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .anim-fade.is-visible { opacity: 1; }

    .anim-slide-up {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .anim-slide-up.is-visible { opacity: 1; transform: none; }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Right image panel -->
  <div class="slide-image" id="slide-image">
    <div class="img-placeholder" aria-hidden="true"></div>
    {{IMAGE_HTML}}
  </div>

  <!-- Left content area -->
  <div class="content-area">

    <div class="red-accent anim-fade" id="el-accent"></div>

    <h2 class="slide-title anim-slide-up" id="el-title">{{SLIDE_TITLE}}</h2>

    <p class="intro-text anim-fade" id="el-intro">{{ON_SCREEN_TEXT}}</p>

    <ul class="obj-list" id="el-objectives">
{{OBJECTIVES_HTML}}
    </ul>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* ── Entrance: header elements first, then objectives stagger in ───────── */
  setTimeout(function () { var el = document.getElementById('el-accent'); if (el) el.classList.add('is-visible'); }, 0);
  setTimeout(function () { var el = document.getElementById('el-title');  if (el) el.classList.add('is-visible'); }, 180);
  setTimeout(function () { var el = document.getElementById('el-intro');  if (el) el.classList.add('is-visible'); }, 350);

  /* Fade-in slide image */
  var imgPanel = document.getElementById('slide-image');
  if (imgPanel) {
    imgPanel.style.opacity = '0';
    imgPanel.style.transition = 'opacity 0.6s ease';
    setTimeout(function () { imgPanel.style.opacity = '1'; }, 600);
  }

  /* Stagger objectives with GSAP */
  var objectives = Array.from(document.querySelectorAll('.obj-item'));
  gsap.set(objectives, { opacity: 0, scale: 0.88, transformOrigin: 'left center' });
  gsap.to(objectives, {
    opacity: 1,
    scale: 1,
    duration: 0.55,
    ease: 'back.out(1.4)',
    stagger: 0.22,
    delay: 0.65
  });

  /* ── VO cue-driven objective highlighting ─────────────────────────────── */
  /* Fill in cue times after VO is recorded. All null = no highlighting. */
  var voTimes = {{VO_CUE_TIMES_JS}};
  var voFired = voTimes.map(function () { return false; });
  var activeIdx = -1;

  function getAudioTime() {
    try {
      if (window.parent && window.parent.CourseRuntime) {
        var t = window.parent.CourseRuntime.getAudioCurrentTime();
        if (Number.isFinite(t) && t > 0) return t;
      }
    } catch (_) {}
    return 0;
  }

  function activateObjective(idx) {
    if (activeIdx >= 0 && objectives[activeIdx]) {
      gsap.to(objectives[activeIdx], { scale: 1, duration: 0.5, ease: 'power2.out', overwrite: true });
    }
    objectives.forEach(function (el, i) {
      if (i > idx && el) gsap.to(el, { filter: 'brightness(0.5)', duration: 0.5, ease: 'power2.out', overwrite: true });
    });
    if (objectives[idx]) {
      gsap.to(objectives[idx], { scale: 1.04, filter: 'brightness(1.3)', duration: 0.45, ease: 'power2.out', overwrite: true });
    }
    activeIdx = idx;
  }

  var virtualTime = 0;
  var lastTick    = Date.now();

  function tick() {
    var now   = Date.now();
    var delta = now - lastTick;
    lastTick  = now;
    if (!document.documentElement.classList.contains('slide-paused')) {
      var at = getAudioTime();
      virtualTime = at > 0 ? at : virtualTime + delta / 1000;
      voTimes.forEach(function (t, i) {
        if (t !== null && !voFired[i] && virtualTime >= t) {
          voFired[i] = true;
          activateObjective(i);
        }
      });
    }
    requestAnimationFrame(tick);
  }
  tick();

}());
</script>

</body>
</html>
