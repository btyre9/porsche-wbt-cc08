<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Left dark panel ──────────────────────────────────────────────────── */
    .split-left {
      position: absolute;
      left: 0; top: 0;
      width: 1040px;
      height: 920px;
      background: #0D0D0F;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Right photo panel ────────────────────────────────────────────────── */
    .split-right {
      position: absolute;
      right: 0; top: 0;
      width: 880px;
      height: 920px;
      z-index: 1;
      overflow: hidden;
    }
    .img-placeholder {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: repeating-linear-gradient(
        -45deg,
        #0E0E12 0px, #0E0E12 24px,
        #141418 24px, #141418 48px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.03em;
      padding: 16px;
      text-align: center;
    }
    .split-right img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 65% top;
      display: block;
      z-index: 1;
    }
    /* Gradient bleeds the photo's left edge into the dark panel */
    .split-right::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        to right,
        #0D0D0F 0%,
        rgba(13, 13, 15, 0.50) 12%,
        rgba(13, 13, 15, 0.00) 30%
      );
    }

    /* ── Decorative skewed bars — left edge of left panel ─────────────────── */
    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px;
      height: 920px;
      z-index: 1;
      pointer-events: none;
    }
    .deco-bar {
      position: absolute;
      left: 0;
      width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg);
      transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    /* ── Content area — title at top, callout anchors to bottom ──────────── */
    .content-area {
      position: absolute;
      left: 100px; top: 0;
      width: 900px;
      height: 920px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 80px 0 72px;
    }

    /* ── Red accent bar ───────────────────────────────────────────────────── */
    .red-accent {
      width: 120px;
      height: 8px;
      background: var(--pds-accent);
      margin-bottom: 20px;
    }

    /* ── Headline ─────────────────────────────────────────────────────────── */
    .headline {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.05;
      color: var(--pds-text-primary);
      margin: 0 0 32px 0;
      max-width: 820px;
    }

    /* ── Body paragraph ───────────────────────────────────────────────────── */
    .pds-body {
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.65;
      color: var(--pds-contrast-high);
      margin: 0 0 32px 0;
      max-width: 800px;
    }

    /* ── Pull-quote ───────────────────────────────────────────────────────── */
    .pull-quote {
      border-left: 4px solid var(--pds-accent);
      padding: 20px 28px;
      background: rgba(26, 26, 30, 0.75);
      font-size: var(--pds-font-size-lg);
      font-weight: var(--pds-font-weight-semibold);
      line-height: 1.45;
      color: var(--pds-text-primary);
      margin: 0 0 32px 0;
      max-width: 800px;
    }

    /* ── Bottom callout — anchors to bottom of content area ─────────────── */
    .callout-box {
      margin-top: auto;
      border-left: 4px solid var(--pds-accent);
      padding: 18px 24px;
      background: rgba(213, 0, 28, 0.07);
      max-width: 800px;
    }
    .callout-box p {
      font-size: var(--pds-font-size-lg);
      font-weight: var(--pds-font-weight-semibold);
      line-height: 1.45;
      color: var(--pds-text-primary);
      margin: 0;
    }
    .callout-box strong {
      color: var(--pds-accent);
    }

    /* ── Entrance animation state ─────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-block.is-visible {
      opacity: 1;
      transform: none;
    }
    .anim-fade-right {
      opacity: 0;
      transform: translateX(-12px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-fade-right.is-visible {
      opacity: 1;
      transform: none;
    }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Left dark panel -->
  <div class="split-left">
    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>

    <div class="content-area">

      <!-- Red accent bar -->
      <div class="red-accent anim-block" id="el-eyebrow" aria-hidden="true"></div>

      <!-- Headline -->
      <h2 class="headline anim-block" id="el-headline">{{SLIDE_TITLE}}</h2>

      <!-- Body content (paragraph or pull-quote from generator) -->
      <div id="el-body" class="anim-block">
        {{BODY_CONTENT_HTML}}
      </div>

      <!-- Bottom callout — anchored via margin-top: auto (absent when field is empty) -->
      {{CALLOUT_HTML}}

    </div>
  </div>

  <!-- Right photo -->
  <div class="split-right">
    <div class="img-placeholder" aria-hidden="true">{{IMAGE_PLACEHOLDER_LABEL}}</div>
    {{IMAGE_HTML}}
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  var loadEls    = ['el-eyebrow', 'el-headline', 'el-body', 'el-callout']
                     .map(function (id) { return document.getElementById(id); })
                     .filter(Boolean);
  var loadDelays = [0, 100, 280, 420];

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      loadEls.forEach(function (el, i) {
        setTimeout(function () { el.classList.add('is-visible'); }, loadDelays[i] || 0);
      });
    });
  });

}());
</script>

</body>
</html>
